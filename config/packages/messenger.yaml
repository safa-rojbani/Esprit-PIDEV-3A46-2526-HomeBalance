framework:
  messenger:
    failure_transport: failed

    transports:
      async:
        dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
        retry_strategy:
          max_retries: 3
          multiplier: 2

      ai_async:
        dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
        retry_strategy:
          max_retries: 2
          multiplier: 2

      # transport dédié au scheduler
      scheduler_default: 'schedule://default'

      failed: 'doctrine://default?queue_name=failed'

    default_bus: messenger.bus.default

    buses:
      messenger.bus.default: []

    routing:
      # scheduler
      App\Message\PurgeTrashMessage: scheduler_default
      App\Message\ApplyTaskPenaltiesMessage: scheduler_default
      App\Message\RunWeeklyInsightsJobMessage: scheduler_default

      # IA / images
      App\Message\AnalyzeTaskProofImageMessage: ai_async

      # notifications & messaging
      App\Message\SendAccountNotification: async
      App\Message\TaskCompleted: async
      # Messagerie module (AI + SMS) — async processing
      App\Message\AI\GenerateSmartRepliesMessage: async
      App\Message\AI\SummarizeConversationMessage: async
      App\Message\SMS\SendSmsFallbackMessage: async
      App\Message\SMS\RecalculateActivityPatternMessage: async
      Symfony\Component\Mailer\Messenger\SendEmailMessage: async
      Symfony\Component\Notifier\Message\ChatMessage: async
      Symfony\Component\Notifier\Message\SmsMessage: async

when@dev:
  framework:
    messenger:
      transports:
        async: 'sync://'
        scheduler_default: 'sync://'
        failed: 'sync://'
